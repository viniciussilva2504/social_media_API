{% extends 'base.html' %}

{% block title %}add book — ant.social{% endblock %}

{% block content %}
<h2 class="section-title">add a book</h2>

<form method="post" enctype="multipart/form-data" class="form-card">
  {% csrf_token %}

  <div class="form-group">
    <label for="title">title *</label>
    <input type="text" id="title" name="title" maxlength="200" required
           placeholder="e.g. The Left Hand of Darkness" />
  </div>

  <div class="form-group">
    <label for="book_author">author *</label>
    <input type="text" id="book_author" name="book_author" maxlength="200" required
           placeholder="e.g. Ursula K. Le Guin" />
  </div>

  <div class="form-group">
    <label for="description">description <span class="form-optional">(optional)</span></label>
    <textarea id="description" name="description" maxlength="500" rows="3"
              placeholder="edition, condition, notes..."></textarea>
  </div>

  <div class="form-group">
    <label for="cover">cover image <span class="form-optional">(optional, max 5MB)</span></label>
    <input type="file" id="cover" name="cover" accept=".jpg,.jpeg,.png,.webp" />
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">add to biblioteca</button>
    <a href="{% url 'biblioteca' username=request.user.username %}" class="btn">cancel</a>
  </div>
</form>
{% endblock %}
