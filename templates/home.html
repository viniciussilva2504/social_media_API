{% extends 'base.html' %}

{% block title %}ant.social — go read a book{% endblock %}

{% block content %}
<div class="hero">
  <div class="hero-title">
    <span class="morse-code morse-code--hero" aria-hidden="true" title="ant.social in morse">
      <!-- A: . - -->
      <b class="md mc1"></b><b class="ml mc2"></b><span class="ms"></span>
      <!-- N: - . -->
      <b class="ml mc3"></b><b class="md mc1"></b><span class="ms"></span>
      <!-- T: - -->
      <b class="ml mc2"></b>
      <!-- word gap (the period) -->
      <span class="mw"></span>
      <!-- S: . . . -->
      <b class="md mc3"></b><b class="md mc1"></b><b class="md mc2"></b><span class="ms"></span>
      <!-- O: - - - -->
      <b class="ml mc3"></b><b class="ml mc1"></b><b class="ml mc2"></b><span class="ms"></span>
      <!-- C: - . - . -->
      <b class="ml mc3"></b><b class="md mc1"></b><b class="ml mc2"></b><b class="md mc3"></b><span class="ms"></span>
      <!-- I: . . -->
      <b class="md mc1"></b><b class="md mc2"></b><span class="ms"></span>
      <!-- A: . - -->
      <b class="md mc3"></b><b class="ml mc1"></b><span class="ms"></span>
      <!-- L: . - . . -->
      <b class="md mc2"></b><b class="ml mc3"></b><b class="md mc1"></b><b class="md mc2"></b>
    </span>
    <h1>ant.social</h1>
  </div>
  <p class="tagline" id="hero-quote">go read a book</p>
  <div class="cta-buttons">
    <a href="{% url 'register' %}" class="btn btn-primary">join</a>
    <a href="{% url 'login' %}" class="btn">login</a>
  </div>
</div>
{% endblock %}
