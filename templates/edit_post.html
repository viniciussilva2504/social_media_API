{% extends 'base.html' %}

{% block title %}edit post — ant.social{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 640px">
  <h2>edit post</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group">
      <textarea name="content" id="compose-textarea" maxlength="280" rows="4"
                required>{{ post.content }}</textarea>
    </div>
    <div class="form-group">
      <label for="image">image</label>
      {% if post.image %}
      <div class="polaroid" style="margin-bottom: 8px">
        <img src="{{ post.image.url }}" alt="" />
      </div>
      <label style="font-size: 13px; color: #888; display: flex; align-items: center; gap: 6px; margin-bottom: 8px">
        <input type="checkbox" name="remove_image" value="1" /> remove image
      </label>
      {% endif %}
      <input type="file" id="image" name="image" accept="image/jpeg,image/png,image/webp" />
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center">
      <span class="char-count" id="char-counter">{{ post.content|length }}</span>
      <div style="display: flex; gap: 8px">
        <a href="{% url 'post_detail' post.id %}" class="btn btn-small">cancel</a>
        <button type="submit" class="btn btn-primary btn-small">save</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
  initCharCounter("compose-textarea", "char-counter", 280);
</script>
{% endblock %}
