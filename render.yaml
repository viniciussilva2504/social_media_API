databases:
  - name: antisocial-db
    plan: free
    databaseName: antisocial_db
    user: antisocial

services:
  - type: web
    name: ant-social
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn social_media.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --max-requests 1000 --max-requests-jitter 50 --access-logfile -
    envVars:
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: SQL_ENGINE
        value: django.db.backends.postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: antisocial-db
          property: connectionString
      - key: CONN_MAX_AGE
        value: "600"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      # Optional — set these in the Render dashboard:
      # - key: CLOUDINARY_URL
      # - key: PERSPECTIVE_API_KEY
